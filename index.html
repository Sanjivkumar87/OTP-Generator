<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | OTP_GEN</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    
    <!-- Icons & Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

   

    <!-- Animated Background -->
    <div class="area">
        <ul class="circles">
            <li></li><li></li><li></li><li></li><li></li>
            <li></li><li></li><li></li><li></li><li></li>
        </ul>
    </div>

    <!-- Main Container -->
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="otp-card text-center p-4 p-md-5">
            
            <div class="terminal-header mb-3">
                <i class="fa-solid fa-microchip pulse-icon"></i>
                <h2 class="fw-bold mb-0">OTP-Generator</h2>
            </div>
            
            <p class="status-subtext mb-4">AWAITING ENCRYPTION COMMAND...</p>

            <!-- OTP Display Area -->
            <div class="otp-display-wrapper mb-4">
                <h1 id="otp-display">------</h1>
                <div class="progress mt-3">
                    <div id="timer-bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-grid gap-3">
                <button id="generate-btn" class="btn btn-primary btn-lg" onclick="generateOTP()">
                    <i class="fa-solid fa-key"></i> GENERATE_OTP
                </button>
                <button id="copy-btn" class="btn btn-outline-secondary btn-sm d-none" onclick="copyOTP()">
                    <i class="fa-solid fa-copy"></i> COPY_OTP
                </button>
            </div>
            
            <p id="timer-text" class="small mt-4 mb-0 opacity-75">SYSTEM_IDLE</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
